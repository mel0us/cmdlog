# cmdlog TUI configuration

# ── Show ─────────────────────────────────────────────────────────────
# Which metadata columns to display next to each command.
# "order" controls left-to-right column position in the TUI.
# time: "off", "date" (absolute timestamp), or "age" (relative, e.g. "3h ago")
# dir:  "off", "abspath" (full directory path), or "relpath" (path relative to git repo root)
# shell, repo, count, exit_code: true/false to show/hide
[show]
order = ["repo", "path", "count", "exit", "time", "shell"]
time = "age"
shell = false
dir = "relpath"
repo = true
count = true
exit_code = false

# ── Filter ───────────────────────────────────────────────────────────
# Narrow which commands are shown. All filters combine with AND.
# this_shell: only commands from the current shell type (bash/zsh/tcsh)
# this_dir:   only commands run in the current working directory
# this_repo:  only commands run inside the current git repository
# today:      only commands from today
# operator:   "off", "piped" (contains |), or "chained" (contains && or ||)
# exit_code:  "off", "success" (exit code 0), or "failure" (non-zero exit code)
[filter]
this_shell = false
this_dir = false
this_repo = false
today = false
operator = "off"     # "off", "piped" (contains |), or "chained" (contains && or ||)
exit_code = "off"    # "off", "success" (exit 0 only), or "failure" (non-zero only)

# ── Order ────────────────────────────────────────────────────────────
# Sort order for the command list. Left-most in "sequence" is primary sort.
# recency:   sort by timestamp — "asc" = newest first, "desc" = oldest first
# frequency: sort by how often a command was used — "asc" = most first, "desc" = least first
[order]
sequence = ["recency", "frequency"]
recency = "asc"
frequency = "asc"

# ── Group ────────────────────────────────────────────────────────────
# Group commands by context. Each enabled dimension creates a bucket:
# matching entries appear above non-matching ones. Sort Order is applied
# independently within each bucket. Left-most in "sequence" has highest priority.
# abspath: group commands from the current working directory
# repo:    group commands from the current git repository
# relpath: group commands from the same relative path within the repo
# Set to false to disable a group dimension.
[group]
sequence = ["abspath", "relpath", "repo"]
abspath = true
repo = true
relpath = true
dedup = true

# ── Inject ───────────────────────────────────────────────────────────
# How selected commands are injected into the shell prompt for editing.
#
# Available methods:
#
#   "readline"  Bash-only. Uses bind -x to invoke a callback that sets
#               READLINE_LINE and READLINE_POINT, placing the command
#               directly into the readline editing buffer. A DSR terminal
#               query (ESC[5n → ESC[0n) triggers the bound callback after
#               the prompt is drawn. The command appears on the prompt
#               line ready to edit; press Enter to execute.
#
#   "print-z"   Zsh-only. Uses the print -z builtin to push the command
#               onto zsh's editing buffer stack. The command appears on
#               the next prompt line ready to edit; press Enter to execute.
#
#   "tiocsti"   All shells. Uses the TIOCSTI ioctl (0x5412) to push each
#               byte of the command into the kernel terminal input queue,
#               simulating keystrokes. The command appears character by
#               character on the prompt line as if typed by the user.
#               Requires Linux < 6.2, or the sysctl:
#                 sysctl -w dev.tty.legacy_tiocsti=1
#               On newer kernels without this sysctl, falls back silently.
#
#   "history"   All shells. Loads the command into shell history only
#               (bash: history -s, zsh: print -s, tcsh: history -L).
#               Nothing appears on the prompt; press Up arrow to recall
#               the command for editing. Works on any kernel version.
#
# The supported options per shell:
#   bash: "readline" (default), "tiocsti", "history"
#   zsh:  "print-z"  (default), "tiocsti", "history"
#   tcsh: "tiocsti"  (default), "history"
[inject]
bash = "readline"
zsh = "print-z"
tcsh = "tiocsti"

# ── Waive ────────────────────────────────────────────────────────────
# Commands to hide from "cmdlog list" output. Filtered at display time,
# not at record time — all commands are still logged to ~/.cmdlog.tsv.
# Commands containing a pipe (|) are always shown regardless of this list.
# Edit this list to add/remove commands. Changes take effect on next "cmdlog list".
[waive]
# Hide single-word commands of this many characters or fewer (0 = disabled).
# e.g. min_cmd_len = 5 hides "cargo" (5 chars) but shows "rustup" (6 chars).
# Commands with shell operators are always shown regardless.
min_cmd_len = 5
commands = [
    "cmdlog", "cl", # exclude cmdlog itself
    "ls", "cp", "mv", "rm", "mkdir", "rmdir", "touch", "chmod", "chown", "ln",
    "stat", "file", "readlink",
    "cat", "head", "tail", "less", "more", "wc", "tee",
    "grep", "egrep", "fgrep", "find", "locate",
    "sort", "uniq", "cut", "tr", "sed", "awk", "diff", "comm", "paste", "column",
    "ps", "top", "htop", "df", "free", "uptime", "uname", "hostname", "whoami",
    "id", "w", "who", "date", "cal",
    "tree", "basename", "dirname", "realpath",
    "man", "info", "whatis", "apropos",
    "true", "false", "yes", "sleep", "clear", "reset", "tput", "stty",
]
