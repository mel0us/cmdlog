name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04-arm
          - target: aarch64-apple-darwin
            runner: macos-14

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dev/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('dev/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build release binary
        working-directory: dev
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run cargo tests
        working-directory: dev
        run: cargo test --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          stage="cmdlog-${{ matrix.target }}"
          mkdir -p "dist/$stage"
          cp dev/target/${{ matrix.target }}/release/cmdlog "dist/$stage/cmdlog"
          cp default.conf "dist/$stage/default.conf"
          tar -C dist -czf "dist/$stage.tar.gz" "$stage"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: cmdlog-${{ matrix.target }}
          path: dist/cmdlog-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  shell-tests:
    name: shell tests (linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install shells
        run: sudo apt-get update && sudo apt-get install -y zsh tcsh expect

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dev/target
          key: shell-tests-cargo-${{ hashFiles('dev/Cargo.lock') }}
          restore-keys: |
            shell-tests-cargo-

      - name: Run test suite
        working-directory: dev
        env:
          RUSTUP_TOOLCHAIN: stable
        run: ./run_tests.sh

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, shell-tests]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cmdlog-*
          generate_release_notes: true
